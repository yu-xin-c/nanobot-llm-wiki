name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Run tests
        run: uv run --extra dev pytest -q
      - name: Lint
        run: uv run --extra dev ruff check src tests
      - name: Smoke-test the NanoBot installer
        run: bash tests/smoke_install.sh
      - name: Build package
        run: uv build
